name: Deploy BackEnd to ECS

on:
  push:
    branches:
      - master
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: houznext-api
  ECS_CLUSTER: prod-cluster
  ECS_SERVICE: backend
  CONTAINER_NAME: backend
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -name Dockerfile

      - name: Build & push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY

          echo "Building image..."
          docker build -f ./Dockerfile -t $ECR_REPOSITORY:$IMAGE_TAG .

          echo "Tagging image with SHA..."
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:$IMAGE_TAG

          echo "Tagging image as latest..."
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:latest

          echo "Pushing SHA tag..."
          docker push $ECR_URI:$IMAGE_TAG

          echo "Pushing latest tag..."
          docker push $ECR_URI:latest

          echo "IMAGE_URI=$ECR_URI:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update ECS service (force new deployment)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
