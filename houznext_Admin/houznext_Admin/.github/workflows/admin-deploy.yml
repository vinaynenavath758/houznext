name: Deploy Admin to ECS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: onecasa-admin
  ECS_CLUSTER: prod-cluster
  ECS_SERVICE: admin
  CONTAINER_NAME: admin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY
           
          docker build \
            --build-arg NEXT_PUBLIC_LOCAL_API_ENDPOINT=${{ secrets.NEXT_PUBLIC_LOCAL_API_ENDPOINT }} --build-arg NEXT_PUBLIC_GOOGLE_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }} --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }} --build-arg FLOOR_PLAN_AI_API_KEY=${{ secrets.FLOOR_PLAN_AI_API_KEY }} -t $ECR_REPOSITORY:$IMAGE_TAG .

          echo "Tagging image with SHA..."
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      
          echo "Tagging image as latest..."
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:latest
      
          echo "Pushing SHA tag..."
          docker push $ECR_URI:$IMAGE_TAG
      
          echo "Pushing latest tag..."
          docker push $ECR_URI:latest
      
          echo "IMAGE_URI=$ECR_URI:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
